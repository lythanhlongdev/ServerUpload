<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 ServerUpload - Batch Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ========== UPLOAD SECTION ========== */
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .drop-zone:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .drop-zone.active {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .drop-zone-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .drop-zone-sub {
            color: #999;
            font-size: 0.9em;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 0.85em;
            color: #999;
        }

        .file-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .file-remove:hover {
            background: #ee5a52;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* ========== PROGRESS ========== */
        .progress-section {
            margin-top: 20px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-item {
            margin-bottom: 15px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        /* ========== STATS ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        /* ========== ALERTS ========== */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert-info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        /* ========== QUEUE INFO ========== */
        .queue-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .queue-info.active {
            display: block;
        }

        .queue-lanes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .queue-lane {
            background: white;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .queue-lane-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .queue-lane-info {
            color: #666;
            font-size: 0.85em;
        }

        /* ========== FILES VIEW ========== */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .file-preview {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
        }

        .file-preview:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-4px);
        }

        .file-preview-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .file-preview-name {
            font-size: 0.9em;
            color: #333;
            word-break: break-all;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .file-preview-size {
            font-size: 0.8em;
            color: #999;
        }

        /* ========== LOADING ========== */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1>📦 ServerUpload</h1>
        <p>Upload & Quản Lý Files Nhanh Chóng 🚀</p>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
        <!-- ========== UPLOAD CARD ========== -->
        <div class="card">
            <h2>📤 Upload Files</h2>

            <!-- Alerts -->
            <div id="alertContainer"></div>

            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" multiple>
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Kéo thả files vào đây</div>
                <div class="drop-zone-sub">hoặc click để chọn</div>
            </div>

            <!-- File List -->
            <div class="file-list" id="fileList"></div>

            <!-- Buttons -->
            <div class="button-group">
                <button class="btn btn-primary" id="uploadBtn" disabled>
                    🚀 Upload (0 files)
                </button>
                <button class="btn btn-secondary" id="clearBtn" disabled>
                    🗑️ Clear
                </button>
            </div>

            <!-- Progress -->
            <div class="progress-section" id="progressSection">
                <div id="progressContainer"></div>
            </div>

            <!-- Queue Info -->
            <div class="queue-info" id="queueInfo">
                <strong>📊 Queue Status:</strong>
                <div class="queue-lanes" id="queueLanes"></div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- ========== FILES VIEW CARD ========== -->
        <div class="card">
            <h2>📂 Files Uploaded</h2>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="grid">Grid View</button>
                <button class="tab" data-tab="list">List View</button>
            </div>

            <!-- Grid View -->
            <div id="grid" class="tab-content active">
                <div class="files-grid" id="filesGrid"></div>
            </div>

            <!-- List View -->
            <div id="list" class="tab-content">
                <div id="filesList"></div>
            </div>

            <!-- Refresh -->
            <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" id="refreshBtn">
                🔄 Refresh Files
            </button>
        </div>
    </div>
</div>

<!-- ========== JAVASCRIPT ========== -->
<script>
    const API_BASE = 'http://localhost:8080';
    let selectedFiles = [];
    let uploadInProgress = false;

    // ========== FILE SELECTION ==========

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const alertContainer = document.getElementById('alertContainer');

    // Drag & drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('active');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('active');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');
        handleFiles(e.dataTransfer.files);
    });

    // Click to select
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        selectedFiles = Array.from(files);
        renderFileList();
        updateButtonStates();
    }

    function renderFileList() {
        fileList.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div class="file-info">
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${formatBytes(file.size)}</div>
                </div>
                <button class="file-remove" onclick="removeFile(${index})">Xóa</button>
            `;
            fileList.appendChild(item);
        });
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFileList();
        updateButtonStates();
    }

    function updateButtonStates() {
        uploadBtn.disabled = selectedFiles.length === 0 || uploadInProgress;
        clearBtn.disabled = selectedFiles.length === 0;
        uploadBtn.innerHTML = `🚀 Upload (${selectedFiles.length} files)`;
    }

    // ========== UPLOAD LOGIC ==========

    uploadBtn.addEventListener('click', uploadBatch);
    clearBtn.addEventListener('click', () => {
        selectedFiles = [];
        fileInput.value = '';
        renderFileList();
        updateButtonStates();
    });

    async function uploadBatch() {
        if (selectedFiles.length === 0 || uploadInProgress) return;

        uploadInProgress = true;
        updateButtonStates();

        const formData = new FormData();
        selectedFiles.forEach(file => {
            formData.append('files', file);
        });

        try {
            showAlert('Đang upload...', 'info');

            const response = await fetch(`${API_BASE}/upload/batch`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                showAlert(`✅ Batch upload thành công! (${data.fileCount} files)`, 'success');
                clearBtn.click();
                startPollingProgress();
                loadUploadedFiles();
            } else {
                showAlert(`❌ Lỗi: ${data.error}`, 'error');
            }

        } catch (error) {
            console.error('Upload error:', error);
            showAlert('❌ Upload thất bại: ' + error.message, 'error');
        } finally {
            uploadInProgress = false;
            updateButtonStates();
        }
    }

    // ========== PROGRESS POLLING ==========

    let pollInterval = null;

    function startPollingProgress() {
        document.getElementById('progressSection').classList.add('active');
        document.getElementById('queueInfo').classList.add('active');

        pollInterval = setInterval(updateQueueStats, 2000);
        updateQueueStats();
    }

    async function updateQueueStats() {
        try {
            const response = await fetch(`${API_BASE}/upload/queue/stats`);
            const stats = await response.json();

            // Update queue lanes
            const queueLanes = document.getElementById('queueLanes');
            queueLanes.innerHTML = `
                <div class="queue-lane">
                    <div class="queue-lane-name">🟢 Lane 1 (Large)</div>
                    <div class="queue-lane-info">
                        ${stats.queue.large.active_threads}/1 active
                    </div>
                </div>
                <div class="queue-lane">
                    <div class="queue-lane-name">🟡 Lane 2 (Medium)</div>
                    <div class="queue-lane-info">
                        ${stats.queue.medium.active_threads}/5 active
                    </div>
                </div>
                <div class="queue-lane">
                    <div class="queue-lane-name">🔵 Lane 3 (Small)</div>
                    <div class="queue-lane-info">
                        ${stats.queue.small.active_threads}/20 active
                    </div>
                </div>
            `;

            // Update stats
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Memory Usage</div>
                    <div class="stat-value">${Math.round(stats.memory.usagePercent)}%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Active Uploads</div>
                    <div class="stat-value">${stats.queue.large.active_threads + stats.queue.medium.active_threads + stats.queue.small.active_threads}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Queue Size</div>
                    <div class="stat-value">${stats.queue.large.queue_size + stats.queue.medium.queue_size + stats.queue.small.queue_size}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Tasks</div>
                    <div class="stat-value">${stats.total_tasks}</div>
                </div>
            `;

        } catch (error) {
            console.error('Stats error:', error);
        }
    }

    // ========== FILES VIEW ==========

    document.getElementById('refreshBtn').addEventListener('click', loadUploadedFiles);

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });

    async function loadUploadedFiles() {
        try {
            const response = await fetch(`${API_BASE}/upload/queue/stats`);
            const stats = await response.json();

            // Dummy data (trong thực tế cần API endpoint để lấy danh sách files)
            const files = [
                { name: 'document.pdf', size: 1024*1024*5, type: 'pdf' },
                { name: 'video.mp4', size: 1024*1024*1024*2, type: 'video' },
                { name: 'image.jpg', size: 1024*1024*3, type: 'image' },
            ];

            renderFilesGrid(files);
            renderFilesList(files);

        } catch (error) {
            console.error('Load files error:', error);
        }
    }

    function renderFilesGrid(files) {
        const grid = document.getElementById('filesGrid');
        grid.innerHTML = files.map(file => `
            <div class="file-preview">
                <div class="file-preview-icon">${getFileIcon(file.type)}</div>
                <div class="file-preview-name">${file.name}</div>
                <div class="file-preview-size">${formatBytes(file.size)}</div>
            </div>
        `).join('');
    }

    function renderFilesList(files) {
        const list = document.getElementById('filesList');
        list.innerHTML = files.map(file => `
            <div class="file-item">
                <div class="file-info">
                    <div class="file-name">${getFileIcon(file.type)} ${file.name}</div>
                    <div class="file-size">${formatBytes(file.size)}</div>
                </div>
            </div>
        `).join('');
    }

    function getFileIcon(type) {
        const icons = {
            'pdf': '📄',
            'video': '🎬',
            'image': '🖼️',
            'zip': '🗜️',
            'doc': '📝'
        };
        return icons[type] || '📦';
    }

    // ========== HELPERS ==========

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    function showAlert(message, type = 'info') {
        const alert = document.createElement('div');
        alert.className = `alert alert-${type} active`;
        alert.textContent = message;
        alertContainer.appendChild(alert);

        setTimeout(() => alert.remove(), 5000);
    }

    // Load initial data
    loadUploadedFiles();
</script>

</body>
</html>
