# =====================================================
# SERVER CONFIGURATION
# =====================================================
server:
  # Cổng chạy ứng dụng
  # Có thể override bằng biến môi trường SERVER_PORT
  # Mặc định: 8080
  port: ${SERVER_PORT:8080}

  # Địa chỉ bind
  # 0.0.0.0 = cho phép truy cập từ mạng nội bộ / Docker
  address: ${SERVER_ADDRESS:0.0.0.0}

  tomcat:
    # Giới hạn dung lượng dữ liệu Tomcat "nuốt" khi client hủy upload giữa chừng
    # Không nên để -1 trong production (nguy cơ DOS)
    # Mặc định: 2GB
    max-swallow-size: ${TOMCAT_MAX_SWALLOW_SIZE:2GB}

    # Giới hạn kích thước form POST tổng thể
    # Mặc định: 10GB
    max-http-form-post-size: ${TOMCAT_MAX_FORM_SIZE:10GB}

    threads:
      # Số thread tối đa xử lý request đồng thời
      # Upload file lớn giữ connection lâu → không nên để quá thấp
      # Mặc định: 100
      max: ${TOMCAT_MAX_THREADS:100}

      # Số thread duy trì sẵn
      # Mặc định: 20
      min-spare: ${TOMCAT_MIN_SPARE:20}


# =====================================================
# APPLICATION CUSTOM CONFIG
# =====================================================
app:
  # Thư mục lưu file upload
  # Phải đảm bảo user chạy service có quyền ghi
  # Mặc định: /var/upload
  upload-dir: ${UPLOAD_DIR:/var/upload}

  # Giới hạn số upload song song (tự xử lý ở service nếu cần)
  # Giúp tránh quá tải IO disk
  max-parallel-upload: ${MAX_PARALLEL_UPLOAD:10}

  # Danh sách MIME type được phép
  # Nên validate lại phía backend để tránh upload file độc hại
  allowed-types: ${ALLOWED_TYPES:image/*,video/*,application/pdf}


# =====================================================
# SPRING CONFIGURATION
# =====================================================
spring:

  main:
    # Chỉ khởi tạo bean khi cần → giảm memory footprint
    # Production nên để true nếu không cần startup nhanh
    lazy-initialization: ${LAZY_INIT:true}

  servlet:
    multipart:
      # Bật hỗ trợ upload multipart
      enabled: true

      # Kích thước tối đa cho mỗi file
      # Mặc định: 5GB
      max-file-size: ${MAX_FILE_SIZE:5GB}

      # Tổng kích thước tối đa cho một request
      # Mặc định: 10GB
      max-request-size: ${MAX_REQUEST_SIZE:10GB}

      # Ngưỡng ghi file xuống disk
      # Giữ nhỏ để tránh giữ file lớn trong RAM
      file-size-threshold: ${FILE_THRESHOLD:2KB}

  thymeleaf:
    # Dev nên để false
    # Production nếu dùng view thì nên bật true
    cache: ${THYMELEAF_CACHE:false}


# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging:
  level:
    # Mức log tổng thể
    root: ${LOG_LEVEL:INFO}

    # Giảm log framework để tránh spam log
    org.springframework: ${SPRING_LOG_LEVEL:WARN}

  file:
    # File log output
    # Nên mount ra volume nếu dùng Docker
    name: ${LOG_FILE:logs/serverupload.log}


# =====================================================
# API CONFIGURATION
# =====================================================
api:
  # Prefix chung cho toàn bộ API
  prefix: ${API_PREFIX:/api/v1}